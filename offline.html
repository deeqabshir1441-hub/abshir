<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waa khad la'aan | Daawo Hadda</title>
    <style>
        :root {
            --primary-green: #10b981;
            --primary-dark: #0f172a;

            --text-secondary: rgba(241, 245, 249, 0.7);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--primary-dark);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .offline-container {
            max-width: 400px;
            background: rgba(255, 255, 255, 0.02);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: var(--primary-green);
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .retry-btn {
            background: var(--primary-green);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <h1>Waa khad la'aan</h1>
        <p>Waxaad moodaa inuusan jirin wax xiriir internet ah. Fadlan hubi khadkaaga si aad u daawato kulamada tooska ah.</p>
