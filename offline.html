<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | TV96 Live</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9924964891667864"
     crossorigin="anonymous"></script>
    <style>
        :root {
            --primary-green: #10b981;
            --primary-dark: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: rgba(241, 245, 249, 0.7);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--primary-dark);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .offline-container {
            max-width: 400px;
            background: rgba(255, 255, 255, 0.02);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: var(--primary-green);
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .retry-btn {
            background: var(--primary-green);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <h1>You are offline</h1>
        <p>It seems like you don't have an internet connection. Please check your network to watch live matches on TV96 Live.</p>
        <a href="/" class="retry-btn">Try again</a>
    </div>
</body>
</html>
