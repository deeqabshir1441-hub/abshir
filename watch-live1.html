    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const video = document.getElementById('live-video');
        const btn1 = document.getElementById('btn-hd');
        const btn2 = document.getElementById('btn-sd');

        // Replace the second URL with your actual Server 2 link
        const source1 = 'https://pub-988290a10bbf42009d966bd9ef7153c8.r2.dev/1.m3u8'; 
        const source2 = 'https://pub-988290a10bbf42009d966bd9ef7153c8.r2.dev/1.m3u8'; 

        let hls = new Hls();

        function loadStream(url) {
            if (!url || url.includes("REPLACE_WITH")) {
                console.error("Server 2 link is missing!");
                return;
            }

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.muted = true; // Most browsers require mute to start
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }

        // Server 1 Click Logic
        if (btn1) {
            btn1.onclick = function() {
                loadStream(source1);
                btn1.classList.add('active');
                btn2.classList.remove('active');
                console.log("Server 1 Activated");
            };
        } else { console.error("Could not find button with id 'server1'"); }

        // Server 2 Click Logic
        if (btn2) {
            btn2.onclick = function() {
                loadStream(source2);
                btn2.classList.add('active');
                btn1.classList.remove('active');
                console.log("Server 2 Activated");
            };
        } else { console.error("Could not find button with id 'server2'"); }

        // Initial Load
        loadStream(source1);

        // Real-time Score Updates
        const API_KEY = "YOUR_API_KEY";
        const MATCH_ID = "YOUR_MATCH_ID"; 
        let lastHome = -1;
        let lastAway = -1;

        function flash(element) {
            if (!element) return;
            element.classList.add("goal-flash");
            setTimeout(() => element.classList.remove("goal-flash"), 2000);
        }

        async function updateScore() {
            try {
                const res = await fetch(`https://v3.football.api-sports.io/fixtures?id=${MATCH_ID}`, {
                    headers: { "x-rapidapi-key": API_KEY }
                });
                const data = await res.json();
                if (!data.response || data.response.length === 0) return;
                
                const match = data.response[0];
                const home = match.goals.home ?? 0;
                const away = match.goals.away ?? 0;
                const homeScoreEl = document.getElementById("home-score");
                const awayScoreEl = document.getElementById("away-score");

                if (lastHome !== -1 && home > lastHome) flash(homeScoreEl);
                if (lastAway !== -1 && away > lastAway) flash(awayScoreEl);

                homeScoreEl.innerText = home;
                awayScoreEl.innerText = away;
                lastHome = home;
                lastAway = away;

                const status = match.fixture.status.short;
                const statusEl = document.querySelector(".match-status");
                if (["1H", "2H", "HT"].includes(status)) {
                    statusEl.innerText = "LIVE 🔴";
                } else if (["FT", "AET", "PEN"].includes(status)) {
                    statusEl.innerText = "Dhamaad";
                } else {
                    statusEl.innerText = "Soo socda";
                }
            } catch (err) {
                console.log("Error updating score:", err);
            }
        }
        updateScore();
        setInterval(updateScore, 15000);
    });
    </script>
