    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Mobile Menu Logic
            const menuIcon = document.querySelector('.menu-icon');
            const navMenu = document.querySelector('.nav-menu');
            const body = document.body;

            if (menuIcon && navMenu) {
                menuIcon.addEventListener('click', (e) => {
                    navMenu.classList.toggle('active');
                    body.classList.toggle('menu-open');
                });

                document.addEventListener('click', (e) => {
                    if (body.classList.contains('menu-open') && !navMenu.contains(e.target) && !menuIcon.contains(e.target)) {
                        navMenu.classList.remove('active');
                        body.classList.remove('menu-open');
                    }
                });
            }

            const video = document.getElementById('live-video');
            const btn1 = document.getElementById('btn-hd');
            const btn2 = document.getElementById('btn-sd');
            const qualityIndicator = document.getElementById('quality-indicator');

            const serverLinks = [
                { name: "HD Server 1", url: 'https://hls.zb252398829.com/sport/202_4911793_2/playlist.m3u8?wsSecret=d8c3777da13693a16e7c73b855ad56dd&wsABSTime=6a1ee743', quality: "1080p HD", btn: btn1 },
                { name: "Standard Server 2", url: 'https://dlhd.vynx.workers.dev/play/91?key=vynx&playlist.m3u8', quality: "720p SD", btn: btn2 }
            ];

            let hls = new Hls();

            function setupPlayer(url, quality) {
                if (Hls.isSupported()) {
                    hls.destroy();
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(() => console.log("Autoplay blocked."));
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', () => video.play());
                }
                if (qualityIndicator) qualityIndicator.innerText = quality;
            }

            async function isLinkWorking(url) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                try {
                    const response = await fetch(url, { method: 'GET', signal: controller.signal, headers: { 'Range': 'bytes=0-0' } });
                    clearTimeout(timeoutId);
                    return response.ok;
                } catch (err) {
                    return false;
                }
            }

            async function checkAndPlay() {
                let activeServer = null;
                for (let server of serverLinks) {
                    if (await isLinkWorking(server.url)) {
                        activeServer = server;
                        break;
                    }
                }
                if (activeServer) {
                    setupPlayer(activeServer.url, activeServer.quality);
                    serverLinks.forEach(s => s.btn?.classList.remove('active'));
                    activeServer.btn?.classList.add('active');
                }
            }

            btn1.onclick = () => { setupPlayer(serverLinks[0].url, serverLinks[0].quality); btn1.classList.add('active'); btn2.classList.remove('active'); };
            btn2.onclick = () => { setupPlayer(serverLinks[1].url, serverLinks[1].quality); btn2.classList.add('active'); btn1.classList.remove('active'); };

            checkAndPlay();

            // Real-time Score Updates
            const API_KEY = "d175585257msh2656f83736302e4p109f24jsn8367cbbb89e0";
            const MATCH_ID = "1136951"; 
            let lastHome = -1;
            let lastAway = -1;

            async function updateLiveScore() {
                try {
                    const timestamp = new Date().getTime();
                    const res = await fetch(`https://api-football-v1.p.rapidapi.com/v3/fixtures?id=${MATCH_ID}&t=${timestamp}`, {
                        headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "api-football-v1.p.rapidapi.com" }
                    });
                    const data = await res.json();
                    if (!data.response || data.response.length === 0) return;
                    
                    const match = data.response[0];
                    const home = match.goals.home ?? 0;
                    const away = match.goals.away ?? 0;
                    document.getElementById("home-score").innerText = home;
                    document.getElementById("away-score").innerText = away;

                    const status = match.fixture.status.short;
                    const statusEl = document.querySelector(".match-status");
                    if (["1H", "2H", "HT"].includes(status)) {
                        statusEl.innerText = "Toos (Live) 🔴";
                        statusEl.className = "match-status status-live";
                    } else if (["FT", "AET", "PEN"].includes(status)) {
                        statusEl.innerText = "Dhamaad";
                        statusEl.className = "match-status status-finished";
                    }
                } catch (err) {
                    console.log("Error updating score:", err);
                }
            }
            updateLiveScore();
            setInterval(updateLiveScore, 15000);
        });
    </script>
