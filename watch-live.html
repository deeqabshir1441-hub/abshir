    <script>
    // Mobile Menu Toggle Logic - Fixed & Stable
    document.addEventListener("DOMContentLoaded", function() {
        const menuIcon = document.querySelector('.menu-icon');
        const navMenu = document.querySelector('.nav-menu');
        const body = document.body;

        let startX, startY;
        const moveThreshold = 10; 

        if (menuIcon && navMenu) {
            const onStart = (e) => {
                startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            };

            const onEnd = (e) => {
                const endX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
                const endY = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;
                const distance = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
                if (distance < moveThreshold) toggleMenu(e);
            };

            const toggleMenu = (e) => {
                e.preventDefault();
                e.stopPropagation();
                navMenu.classList.toggle('active');
                body.classList.toggle('menu-open');
            };

            menuIcon.addEventListener('touchstart', onStart, { passive: true });
            menuIcon.addEventListener('touchend', onEnd);
            menuIcon.addEventListener('mousedown', onStart);
            menuIcon.addEventListener('mouseup', onEnd);

            document.addEventListener('click', (e) => {
                if (body.classList.contains('menu-open') && !navMenu.contains(e.target) && !menuIcon.contains(e.target)) {
                    navMenu.classList.remove('active');
                    body.classList.remove('menu-open');
                }
            });
            navMenu.addEventListener('click', (e) => e.stopPropagation());
        }
    });

    // Video Player Logic
    document.addEventListener("DOMContentLoaded", function() {
        const video = document.getElementById('live-video');
        const btn1 = document.getElementById('btn-hd');
        const btn2 = document.getElementById('btn-sd');
        const qualityIndicator = document.getElementById('quality-indicator');

        // Replace the second URL with your actual Server 2 link
        const source1 = 'https://streaming.cdnx-sportnobar.xyz/live/hd-en-6MwdL933tCehrVDC5K.m3u8'; 
        const source2 = 'https://dlhd.vynx.workers.dev/play/91?key=vynx&playlist.m3u8'; 

        let hls = new Hls();

        function loadStream(url) {
            if (!url || url.includes("REPLACE_WITH")) {
                console.error("Server 2 link is missing!");
                return;
            }

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.muted = true; // Most browsers require mute to start
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }

        // Server 1 Click Logic
        if (btn1) {
            btn1.onclick = function() {
                loadStream(source1);
                btn1.classList.add('active');
                btn2.classList.remove('active');
                if (qualityIndicator) qualityIndicator.innerText = "1080p HD";
                console.log("Server 1 Activated");
            };
        } else { console.error("Could not find button with id 'btn-hd'"); }

        // Server 2 Click Logic
        if (btn2) {
            btn2.onclick = function() {
                loadStream(source2);
                btn2.classList.add('active');
                btn1.classList.remove('active');
                if (qualityIndicator) qualityIndicator.innerText = "720p SD";
                console.log("Server 2 Activated");
            };
        } else { console.error("Could not find button with id 'btn-sd'"); }

        // Initial Load
        loadStream(source1);
    });
    </script>
